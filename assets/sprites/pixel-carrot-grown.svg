  <rect x="12" y="0" width="8" height="4" fill="#5de06a" />
  <rect x="10" y="2" width="12" height="2" fill="#2f8f3a" />
  <rect x="8" y="4" width="6" height="2" fill="#5de06a" />
  <rect x="18" y="4" width="6" height="2" fill="#5de06a" />
  <!-- carrot body -->
  <rect x="12" y="6" width="8" height="20" fill="#ff8a3d" />
  <rect x="12" y="6" width="2" height="20" fill="#6b3f1a" opacity="0.9" />
  <rect x="18" y="6" width="2" height="20" fill="#6b3f1a" opacity="0.9" />
  <!-- highlight -->
  <rect x="14" y="10" width="2" height="12" fill="#ffd2aa" opacity="0.95" />
  <!-- tip -->
