<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Pixel-art dog house -->

  <!-- Roof -->
  <rect x="3" y="3" width="10" height="1" fill="#8B3A3A"/>
  <rect x="4" y="2" width="8" height="1" fill="#A04444"/>
  <rect x="5" y="1" width="6" height="1" fill="#C05050"/>
  <rect x="6" y="0" width="4" height="1" fill="#D06060"/>

  <!-- Roof sides / overhang -->
  <rect x="2" y="4" width="12" height="1" fill="#7A2E2E"/>

  <!-- Walls -->
  <rect x="3" y="5" width="10" height="8" fill="#D4A96A"/>
  <!-- Wall shading -->
  <rect x="3" y="5" width="1" height="8" fill="#B8894A"/>
  <rect x="12" y="5" width="1" height="8" fill="#C09050"/>

  <!-- Door (arched) -->
  <rect x="6" y="8" width="4" height="5" fill="#1a1008"/>
  <rect x="7" y="7" width="2" height="1" fill="#1a1008"/>

  <!-- Door frame -->
  <rect x="5" y="7" width="1" height="6" fill="#a07040"/>
  <rect x="10" y="7" width="1" height="6" fill="#a07040"/>
  <rect x="6" y="7" width="4" height="1" fill="#a07040"/>

  <!-- "WOOF" sign plaque -->
  <rect x="6" y="9" width="4" height="2" fill="#c8a060"/>
  <!-- Tiny dots for letters -->
  <rect x="7" y="10" width="1" height="1" fill="#6a3a0a"/>
  <rect x="9" y="10" width="1" height="1" fill="#6a3a0a"/>

  <!-- Ground base -->
  <rect x="2" y="13" width="12" height="1" fill="#8a6a3a"/>
  <rect x="1" y="14" width="14" height="1" fill="#6a4a1a"/>

  <!-- Bone decoration on roof peak -->
  <rect x="7" y="0" width="2" height="1" fill="#f0e8d0"/>
</svg>
