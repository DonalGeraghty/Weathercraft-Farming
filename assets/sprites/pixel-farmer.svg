<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <rect width="32" height="32" fill="none"/>
  <!-- Pitchfork -->
  <rect x="24" y="4" width="2" height="24" fill="#b9a57a"/>
  <rect x="20" y="8" width="6" height="2" fill="#6aa84f"/>
  <rect x="20" y="12" width="6" height="2" fill="#6aa84f"/>
  <rect x="22" y="6" width="4" height="2" fill="#6aa84f"/>
  <!-- Hat -->
  <rect x="12" y="2" width="8" height="6" fill="#7a4a1f"/>
  <rect x="8" y="6" width="16" height="4" fill="#6b3f1a"/>
  <rect x="8" y="8" width="16" height="2" fill="#8a5a2b"/>
  <!-- Head -->
  <rect x="12" y="8" width="8" height="8" fill="#f2c9a5"/>
  <rect x="12" y="14" width="8" height="2" fill="#d19b7b"/>
  <!-- Arms -->
  <rect x="8" y="18" width="4" height="4" fill="#2f8f3a"/>
  <rect x="20" y="18" width="4" height="4" fill="#2f8f3a"/>
  <!-- Shirt / Apron -->
  <rect x="12" y="16" width="8" height="10" fill="#2f8f3a"/>
  <rect x="10" y="18" width="12" height="8" fill="#1f6f2a"/>
  <!-- Pants -->
  <rect x="12" y="24" width="4" height="6" fill="#2b5fd5"/>
  <rect x="16" y="24" width="4" height="6" fill="#2b5fd5"/>
  <!-- Boots -->
  <rect x="10" y="30" width="6" height="2" fill="#1b1325"/>
  <rect x="16" y="30" width="6" height="2" fill="#1b1325"/>
</svg>
