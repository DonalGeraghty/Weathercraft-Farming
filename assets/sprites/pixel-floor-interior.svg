<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Base plank fill -->
  <rect x="0" y="0" width="32" height="32" fill="#BF6E32"/>

  <!-- ── Vertical plank separators ── -->
  <rect x="7"  y="0" width="1" height="32" fill="#1E0C04"/>
  <rect x="15" y="0" width="1" height="32" fill="#1E0C04"/>
  <rect x="23" y="0" width="1" height="32" fill="#1E0C04"/>

  <!-- ── Plank 1 (x 0-6): seam at y=21 ── -->
  <rect x="0" y="0" width="1" height="32" fill="#D88040"/>
  <rect x="4" y="0" width="1" height="32" fill="#A85C28" opacity="0.55"/>
  <rect x="6" y="0" width="1" height="32" fill="#9A5422" opacity="0.35"/>
  <rect x="0" y="21" width="7" height="1" fill="#2A1206"/>
  <!-- nail holes at seam corners -->
  <rect x="0" y="20" width="2" height="1" fill="#3C1C08"/>
  <rect x="5" y="20" width="2" height="1" fill="#3C1C08"/>

  <!-- ── Plank 2 (x 8-14): seam at y=10 ── -->
  <rect x="8"  y="0" width="1" height="32" fill="#D88040"/>
  <rect x="12" y="0" width="1" height="32" fill="#A85C28" opacity="0.55"/>
  <rect x="14" y="0" width="1" height="32" fill="#9A5422" opacity="0.35"/>
  <rect x="8" y="10" width="7" height="1" fill="#2A1206"/>
  <rect x="8"  y="9" width="2" height="1" fill="#3C1C08"/>
  <rect x="13" y="9" width="2" height="1" fill="#3C1C08"/>

  <!-- ── Plank 3 (x 16-22): seam at y=21 ── -->
  <rect x="16" y="0" width="1" height="32" fill="#D88040"/>
  <rect x="20" y="0" width="1" height="32" fill="#A85C28" opacity="0.55"/>
  <rect x="22" y="0" width="1" height="32" fill="#9A5422" opacity="0.35"/>
  <rect x="16" y="21" width="7" height="1" fill="#2A1206"/>
  <rect x="16" y="20" width="2" height="1" fill="#3C1C08"/>
  <rect x="21" y="20" width="2" height="1" fill="#3C1C08"/>

  <!-- ── Plank 4 (x 24-31): seam at y=10 ── -->
  <rect x="24" y="0" width="1" height="32" fill="#D88040"/>
  <rect x="28" y="0" width="1" height="32" fill="#A85C28" opacity="0.55"/>
  <rect x="30" y="0" width="1" height="32" fill="#9A5422" opacity="0.35"/>
  <rect x="24" y="10" width="8" height="1" fill="#2A1206"/>
  <rect x="24" y="9" width="2" height="1" fill="#3C1C08"/>
  <rect x="29" y="9" width="2" height="1" fill="#3C1C08"/>

  <!-- ── Subtle top/bottom edge darkening for depth ── -->
  <rect x="0" y="0"  width="32" height="1" fill="#1E0C04" opacity="0.3"/>
  <rect x="0" y="31" width="32" height="1" fill="#1E0C04" opacity="0.3"/>
</svg>
