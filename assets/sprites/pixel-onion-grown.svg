  <rect x="12" y="4" width="2" height="4" fill="#1f6f2a" opacity="0.9" />
  <rect x="18" y="4" width="2" height="4" fill="#1f6f2a" opacity="0.9" />
  <!-- bulb layers -->
  <rect x="10" y="12" width="12" height="16" fill="#f0d5ff" />
  <rect x="10" y="12" width="2" height="16" fill="#7a4ac2" opacity="0.9" />
