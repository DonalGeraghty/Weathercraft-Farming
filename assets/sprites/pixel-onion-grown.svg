<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- stem -->
  <rect x="7" y="2" width="2" height="5" fill="#2f8f3a" />
  <rect x="6" y="2" width="1" height="2" fill="#1f6f2a" opacity="0.9" />
  <rect x="9" y="2" width="1" height="2" fill="#1f6f2a" opacity="0.9" />

  <!-- bulb layers -->
  <rect x="5" y="6" width="6" height="8" fill="#f0d5ff" />
  <rect x="5" y="6" width="1" height="8" fill="#7a4ac2" opacity="0.9" />
  <rect x="10" y="6" width="1" height="8" fill="#7a4ac2" opacity="0.9" />

  <!-- banding -->
  <rect x="6" y="8" width="4" height="1" fill="#d7b1ff" opacity="0.95" />
  <rect x="6" y="10" width="4" height="1" fill="#d7b1ff" opacity="0.95" />

  <!-- root base -->
  <rect x="6" y="14" width="4" height="1" fill="#7a4ac2" opacity="0.8" />
</svg>
