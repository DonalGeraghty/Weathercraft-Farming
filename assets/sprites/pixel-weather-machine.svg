<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Main Blue Block -->
  <rect x="6" y="20" width="20" height="10" fill="#2d5a8e"/>
  <rect x="6" y="20" width="20" height="2" fill="#4d88c2"/>
  <rect x="6" y="28" width="20" height="2" fill="#1b3a5b"/>
  <!-- Brass/Gold Edging -->
  <rect x="4" y="20" width="2" height="12" fill="#ca9e31"/>
  <rect x="26" y="20" width="2" height="12" fill="#ca9e31"/>
  <rect x="4" y="20" width="2" height="2" fill="#fbd55d"/>
  <rect x="26" y="20" width="2" height="2" fill="#fbd55d"/>
  <rect x="4" y="30" width="2" height="2" fill="#8e6d22"/>
  <rect x="26" y="30" width="2" height="2" fill="#8e6d22"/>
  <!-- Top Gold Slab -->
  <rect x="6" y="16" width="20" height="4" fill="#ca9e31"/>
  <rect x="6" y="16" width="20" height="2" fill="#fbd55d"/>
  <!-- Screen/Controls -->
  <rect x="10" y="22" width="12" height="6" fill="#1a3149"/>
  <rect x="12" y="24" width="8" height="2" fill="#4fa4c8"/>
  <!-- Glass Orb -->
  <rect x="10" y="4" width="12" height="12" fill="#88c9e8" fill-opacity="0.4"/>
  <rect x="12" y="2" width="8" height="2" fill="#88c9e8" fill-opacity="0.4"/>
  <rect x="12" y="16" width="8" height="2" fill="#88c9e8" fill-opacity="0.4"/>
  <!-- Sun Orb Core -->
  <rect x="14" y="8" width="4" height="4" fill="#fbd55d"/>
  <rect x="16" y="8" width="2" height="2" fill="#fff"/>
  <rect x="12" y="10" width="2" height="2" fill="#fbd55d"/>
  <rect x="18" y="10" width="2" height="2" fill="#fbd55d"/>
  <rect x="14" y="6" width="4" height="2" fill="#ca9e31"/>
  <rect x="14" y="12" width="4" height="2" fill="#ca9e31"/>
  <!-- Clouds -->
  <rect x="8" y="2" width="6" height="4" fill="#ffffff" fill-opacity="0.9"/>
  <rect x="18" y="2" width="6" height="4" fill="#ffffff" fill-opacity="0.9"/>
  <rect x="10" y="0" width="4" height="2" fill="#ffffff" fill-opacity="0.9"/>
  <rect x="18" y="0" width="4" height="2" fill="#ffffff" fill-opacity="0.9"/>
  <rect x="6" y="4" width="2" height="2" fill="#e0e0e0" fill-opacity="0.8"/>
  <rect x="24" y="4" width="2" height="2" fill="#e0e0e0" fill-opacity="0.8"/>
  <!-- Gold connection -->
  <rect x="14" y="16" width="4" height="2" fill="#ca9e31"/>
</svg>
