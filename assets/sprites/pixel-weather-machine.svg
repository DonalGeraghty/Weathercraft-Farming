<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Weather Machine Body (Blue/Gold) -->
  <!-- Main Blue Block -->
  <rect x="3" y="10" width="10" height="5" fill="#2d5a8e"/>
  <rect x="3" y="10" width="10" height="1" fill="#4d88c2"/>
  <rect x="3" y="14" width="10" height="1" fill="#1b3a5b"/>
  
  <!-- Brass/Gold Edging/Supports -->
  <rect x="2" y="10" width="1" height="6" fill="#ca9e31"/>
  <rect x="13" y="10" width="1" height="6" fill="#ca9e31"/>
  <rect x="2" y="10" width="1" height="1" fill="#fbd55d"/>
  <rect x="13" y="10" width="1" height="1" fill="#fbd55d"/>
  <rect x="2" y="15" width="1" height="1" fill="#8e6d22"/>
  <rect x="13" y="15" width="1" height="1" fill="#8e6d22"/>

  <!-- Top Gold Slab -->
  <rect x="3" y="8" width="10" height="2" fill="#ca9e31"/>
  <rect x="3" y="8" width="10" height="1" fill="#fbd55d"/>
  
  <!-- Screen/Controls on front -->
  <rect x="5" y="11" width="6" height="3" fill="#1a3149"/>
  <rect x="6" y="12" width="4" height="1" fill="#4fa4c8"/>
  
  <!-- Central Glass Orb Mechanism -->
  <!-- Glass Shimmer -->
  <rect x="5" y="2" width="6" height="6" fill="#88c9e8" fill-opacity="0.4"/>
  <rect x="6" y="1" width="4" height="1" fill="#88c9e8" fill-opacity="0.4"/>
  <rect x="6" y="8" width="4" height="1" fill="#88c9e8" fill-opacity="0.4"/>
  
  <!-- Sun Orb Core (Golden/Orange) -->
  <rect x="7" y="4" width="2" height="2" fill="#fbd55d"/>
  <rect x="8" y="4" width="1" height="1" fill="#fff"/> <!-- Shimmer -->
  <rect x="6" y="5" width="1" height="1" fill="#fbd55d"/>
  <rect x="9" y="5" width="1" height="1" fill="#fbd55d"/>
  <rect x="7" y="3" width="2" height="1" fill="#ca9e31"/>
  <rect x="7" y="6" width="2" height="1" fill="#ca9e31"/>
  
  <!-- Puffy Clouds on top corners (White/Gray) -->
  <rect x="4" y="1" width="3" height="2" fill="#ffffff" fill-opacity="0.9"/>
  <rect x="9" y="1" width="3" height="2" fill="#ffffff" fill-opacity="0.9"/>
  <rect x="5" y="0" width="2" height="1" fill="#ffffff" fill-opacity="0.9"/>
  <rect x="9" y="0" width="2" height="1" fill="#ffffff" fill-opacity="0.9"/>
  <rect x="3" y="2" width="1" height="1" fill="#e0e0e0" fill-opacity="0.8"/>
  <rect x="12" y="2" width="1" height="1" fill="#e0e0e0" fill-opacity="0.8"/>
  
  <!-- Gold Base connection to bulb -->
  <rect x="7" y="8" width="2" height="1" fill="#ca9e31"/>
</svg>
