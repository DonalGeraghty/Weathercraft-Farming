<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Tiny pixel-art farmer; SVG keeps it self-contained with no extra assets. -->
  <rect width="16" height="16" fill="none"/>

  <!-- Pitchfork -->
  <rect x="12" y="2" width="1" height="12" fill="#b9a57a"/>
  <rect x="10" y="4" width="3" height="1" fill="#6aa84f"/>
  <rect x="10" y="6" width="3" height="1" fill="#6aa84f"/>
  <rect x="11" y="3" width="2" height="1" fill="#6aa84f"/>

  <!-- Hat -->
  <rect x="6" y="1" width="4" height="3" fill="#7a4a1f"/>
  <rect x="4" y="3" width="8" height="2" fill="#6b3f1a"/>
  <rect x="4" y="4" width="8" height="1" fill="#8a5a2b"/>

  <!-- Head -->
  <rect x="6" y="4" width="4" height="4" fill="#f2c9a5"/>
  <rect x="6" y="7" width="4" height="1" fill="#d19b7b"/>

  <!-- Arms -->
  <rect x="4" y="9" width="2" height="2" fill="#2f8f3a"/>
  <rect x="10" y="9" width="2" height="2" fill="#2f8f3a"/>

  <!-- Shirt / Apron -->
  <rect x="6" y="8" width="4" height="5" fill="#2f8f3a"/>
  <rect x="5" y="9" width="6" height="4" fill="#1f6f2a"/>

  <!-- Pants -->
  <rect x="6" y="12" width="2" height="3" fill="#2b5fd5"/>
  <rect x="8" y="12" width="2" height="3" fill="#2b5fd5"/>

  <!-- Boots -->
  <rect x="5" y="15" width="3" height="1" fill="#1b1325"/>
  <rect x="8" y="15" width="3" height="1" fill="#1b1325"/>
</svg>
